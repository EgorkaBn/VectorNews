<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
    <title>ВЕКТОР — Мировые новости</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: "Outfit", sans-serif; 
            background: linear-gradient(135deg, rgba(248,250,252,0.90) 0%, rgba(226,232,240,0.70) 50%, rgba(241,245,249,0.50) 100%), 
                        url("https://images.unsplash.com/photo-1551632811-561732d1e306?w=1440") center/cover no-repeat fixed !important;
        }
        body.dark { 
            background: linear-gradient(135deg, rgba(15,15,35,0.88) 0%, rgba(26,26,46,0.82) 50%, rgba(15,52,96,0.72) 100%), 
                        url("https://images.unsplash.com/photo-1551632811-561732d1e306?w=1440") center/cover no-repeat fixed !important;
            color: #f1f5f9 !important;
        }
        .display-font { font-family: "Playfair Display", serif; }
        .logo-main { 
            font-family: "Playfair Display", serif !important; 
            font-weight: 900 !important; 
            letter-spacing: -0.03em;
        }
        .logo-gradient { 
            background: linear-gradient(135deg, #B91C1C 0%, #D97706 50%, #F8FAFC 100%); 
            background-clip: text; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 12px rgba(185,28,28,0.6)); 
        }
        .glass { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(148,163,184,0.2); 
            color: #0f172a;
        }
        body.dark .glass { 
            background: rgba(30,41,59,0.95); 
            border-color: rgba(71,85,105,0.6); 
            color: #f1f5f9 !important;
        }
        .topic-btn { 
            padding: 0.5rem 1rem; 
            border-radius: 9999px; 
            font-weight: 600; 
            font-size: 0.875rem; 
            transition: all 0.2s ease; 
            color: #475569 !important;
            white-space: nowrap;
            background: rgba(248,250,252,0.7);
            backdrop-filter: blur(12px);
        }
        body.dark .topic-btn { 
            color: #e2e8f0 !important; 
            background: rgba(71,85,105,0.4);
        }
        .topic-btn:hover, .topic-btn.active { 
            background: linear-gradient(135deg, #B91C1C, #D97706) !important; 
            color: white !important; 
            box-shadow: 0 4px 12px rgba(185,28,28,0.4);
        }
        .flag-btn { padding: 0.5rem 0.75rem !important; min-width: 44px; font-size: 1rem !important; }
        .flag-btn span { font-size: 1.25em; }
        .nav-row { margin-bottom: 0.75rem; }
        .nav-row:last-child { margin-bottom: 0; }
        
        /* Карточки новостей */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        .news-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }
        body.dark .news-card {
            background: rgba(30,41,59,0.7);
            border-color: rgba(255,255,255,0.05);
        }
        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.2);
        }
        .card-source {
            font-size: 11px;
            font-weight: 600;
            color: #B91C1C;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        body.dark .card-source { color: #f97316; }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .card-desc {
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        body.dark .card-desc { color: #94a3b8; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #64748b;
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        body.dark .card-footer { color: #94a3b8; border-color: rgba(255,255,255,0.05); }
        .translate-btn {
            background: rgba(185,28,28,0.1);
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 10px;
            cursor: pointer;
            color: #B91C1C;
            font-weight: 600;
        }
        body.dark .translate-btn { color: #f97316; background: rgba(249,115,22,0.15); }
        .loader { text-align: center; padding: 60px 20px; }
        .spinner { width: 48px; height: 48px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #B91C1C; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            max-width: 600px;
            width: 90%;
            border-radius: 32px;
            padding: 28px;
            max-height: 80vh;
            overflow-y: auto;
        }
        body.dark .modal-content { background: #1e293b; }
        .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #475569;
        }
        body.dark .close-modal { color: #94a3b8; }
        .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; padding-right: 30px; }
        .modal-meta { font-size: 12px; color: #64748b; margin-bottom: 20px; }
        .modal-text { font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .modal-source { padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        body.dark .modal-source { border-color: #334155; }
        .modal-source a { color: #B91C1C; text-decoration: none; }
        body.dark .modal-source a { color: #f97316; }
        
        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 dark:text-slate-100 transition-all duration-300 p-4 md:p-8">

    <!-- HEADER -->
    <header class="max-w-6xl mx-auto mb-4">
        <div class="glass rounded-2xl p-4 md:p-5 shadow-xl">
            <div class="flex items-center justify-between gap-4">
                <div class="flex flex-col items-start">
                    <h1 class="logo-gradient logo-main text-4xl md:text-5xl lg:text-6xl mb-1 leading-tight">ВЕКТОР</h1>
                    <span class="text-lg md:text-xl font-semibold tracking-tight -mt-1">новости</span>
                </div>
                <div class="flex items-center gap-2 md:gap-3">
                    <button id="themeBtn" class="topic-btn px-4 md:px-5 py-2 md:py-2.5 shadow-lg hover:shadow-xl flex items-center gap-1.5 font-semibold">
                        <span id="themeIcon">🌙</span>
                        <span id="themeText">НОЧЬ</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- НАВИГАЦИЯ -->
    <nav class="max-w-6xl mx-auto mb-4">
        <div class="glass rounded-2xl p-3 md:p-4 shadow-xl">
            <div class="nav-row flex flex-wrap gap-2 md:gap-3 justify-center mb-3">
                <button class="topic-btn active" data-theme="all">🌍 Все новости</button>
                <button class="topic-btn" data-theme="politics">🏛 Политика</button>
                <button class="topic-btn" data-theme="war">⚔️ Конфликт</button>
                <button class="topic-btn" data-theme="cyber">🛡 Кибербезопасность</button>
                <button class="topic-btn" data-theme="incidents">🚨 Происшествия</button>
                <button class="topic-btn" data-theme="economy">💰 Экономика</button>
            </div>
            <div class="nav-row flex gap-2 md:gap-3 justify-center">
                <button class="topic-btn flag-btn" data-theme="usa">🇺🇸 США</button>
                <button class="topic-btn flag-btn" data-theme="japan">🇯🇵 Япония</button>
                <button class="topic-btn flag-btn" data-theme="turkmenistan">🇹🇲 Туркменистан</button>
                <button class="topic-btn flag-btn" data-theme="tajikistan">🇹🇯 Таджикистан</button>
            </div>
        </div>
    </nav>

    <!-- ЛЕНТА НОВОСТЕЙ -->
    <div class="max-w-6xl mx-auto">
        <div class="glass rounded-2xl p-4 md:p-6 shadow-xl">
            <h2 class="text-2xl font-bold mb-4 display-font">📰 Последние новости</h2>
            <div id="newsGrid" class="news-grid">
                <div class="loader"><div class="spinner"></div><p>Загрузка новостей...</p></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">✕</button>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-source" id="modalLink"></div>
        </div>
    </div>

    <script>
        // ============ ИСТОЧНИКИ ============
        const RSS_FEEDS = [
            { name: 'ТАСС', url: 'https://tass.ru/rss/v2.xml' },
            { name: 'РИА Новости', url: 'https://ria.ru/export/rss2/index.xml' },
            { name: 'Ведомости', url: 'https://www.vedomosti.ru/rss/news' },
            { name: 'BBC News', url: 'http://feeds.bbci.co.uk/news/rss.xml' },
            { name: 'Reuters', url: 'https://www.reuters.com/rss/topNews' }
        ];

        // Ключевые слова для фильтрации
        const THEME_KEYWORDS = {
            politics: ['политика', 'президент', 'выборы', 'закон', 'санкции', 'госдеп', 'кремль', 'путин', 'байден', 'трамп'],
            war: ['война', 'конфликт', 'армия', 'танк', 'ракета', 'удар', 'обстрел', 'украина', 'израиль', 'палестина'],
            cyber: ['кибер', 'хакер', 'взлом', 'данные', 'безопасность', 'атака', 'вирус'],
            incidents: ['теракт', 'взрыв', 'катастрофа', 'пожар', 'чп', 'криминал', 'убийство', 'дтп'],
            economy: ['экономика', 'рынок', 'нефть', 'цена', 'доллар', 'рубль', 'инфляция', 'кризис'],
            usa: ['сша', 'америка', 'вашингтон', 'трамп', 'байден', 'конгресс'],
            japan: ['япония', 'токио'],
            turkmenistan: ['туркменистан', 'ашхабад'],
            tajikistan: ['таджикистан', 'душанбе']
        };

        let allNews = [];
        let currentTheme = 'all';
        let currentFiltered = [];

        // ============ ЗАГРУЗКА НОВОСТЕЙ ============
        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loader"><div class="spinner"></div><p>Загрузка новостей...</p></div>';
            
            let allItems = [];
            
            for (const feed of RSS_FEEDS) {
                try {
                    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    if (data.status === 'ok' && data.items) {
                        const items = data.items.slice(0, 10).map(item => ({
                            title: item.title?.replace(/<[^>]*>/g, '') || 'Без заголовка',
                            description: item.description?.replace(/<[^>]*>/g, '').substring(0, 300) || 'Описание отсутствует',
                            url: item.link || '#',
                            source: feed.name,
                            publishedAt: item.pubDate || new Date().toISOString()
                        }));
                        allItems.push(...items);
                    }
                } catch(e) {
                    console.warn(`Ошибка загрузки ${feed.name}:`, e);
                }
            }
            
            allNews = allItems.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
            applyFilter();
        }
        
        function applyFilter() {
            if (currentTheme === 'all') {
                currentFiltered = allNews.slice(0, 30);
            } else {
                const keywords = THEME_KEYWORDS[currentTheme] || [];
                currentFiltered = allNews.filter(news => {
                    const text = (news.title + ' ' + news.description).toLowerCase();
                    return keywords.some(kw => text.includes(kw.toLowerCase()));
                }).slice(0, 30);
            }
            renderNews();
        }
        
        function ago(dateStr) {
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return 'недавно';
                const m = Math.floor((new Date() - d) / 60000);
                if (m < 1) return 'только что';
                if (m < 60) return `${m} мин назад`;
                if (m < 1440) return `${Math.floor(m/60)} ч назад`;
                return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
            } catch { return 'недавно'; }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function renderNews() {
            const grid = document.getElementById('newsGrid');
            if (!currentFiltered.length) {
                grid.innerHTML = '<div class="loader"><p>😕 Новостей не найдено</p></div>';
                return;
            }
            
            grid.innerHTML = currentFiltered.map(news => `
                <div class="news-card" onclick="openModal('${escapeHtml(news.title)}', '${escapeHtml(news.source)}', '${escapeHtml(news.description)}', '${escapeHtml(news.url)}', '${news.publishedAt}')">
                    <div class="card-source">📰 ${escapeHtml(news.source)}</div>
                    <div class="card-title">${escapeHtml(news.title)}</div>
                    <div class="card-desc">${escapeHtml(news.description.substring(0, 120))}${news.description.length > 120 ? '...' : ''}</div>
                    <div class="card-footer">
                        <span>🕒 ${ago(news.publishedAt)}</span>
                        <button class="translate-btn" onclick="event.stopPropagation(); translateText('${escapeHtml(news.title)}', '${escapeHtml(news.description)}')">🌐 Перевести</button>
                    </div>
                </div>
            `).join('');
        }
        
        // ============ ПЕРЕВОД ============
        window.translateText = async function(title, desc) {
            const text = title + '. ' + desc;
            try {
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ru&dt=t&q=${encodeURIComponent(text.substring(0, 1000))}`);
                const data = await response.json();
                let translated = '';
                if (data && data[0]) {
                    for (const segment of data[0]) {
                        if (segment[0]) translated += segment[0];
                    }
                }
                alert('📝 Перевод:\n\n' + (translated || 'Не удалось перевести'));
            } catch(e) { alert('Ошибка перевода'); }
        };
        
        // ============ МОДАЛЬНОЕ ОКНО ============
        window.openModal = function(title, source, text, url, date) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalMeta').innerHTML = `${source} · ${ago(date)} · ${new Date(date).toLocaleString('ru-RU')}`;
            document.getElementById('modalText').innerHTML = text || 'Описание отсутствует.';
            document.getElementById('modalLink').innerHTML = `📌 Источник: <a href="${url}" target="_blank">${source}</a> — Все права принадлежат автору.`;
            document.getElementById('newsModal').classList.add('active');
        };
        
        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
        }
        
        document.getElementById('closeModalBtn').onclick = closeModal;
        document.getElementById('newsModal').onclick = (e) => { if (e.target === document.getElementById('newsModal')) closeModal(); };
        
        // ============ ТЕМНАЯ ТЕМА ============
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const body = document.body;
        
        themeBtn.addEventListener('click', () => {
            body.classList.toggle('dark');
            if (body.classList.contains('dark')) {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'ДЕНЬ';
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'НОЧЬ';
            }
            localStorage.setItem('darkMode', body.classList.contains('dark'));
        });
        
        if (localStorage.getItem('darkMode') === 'true') {
            body.classList.add('dark');
            themeIcon.textContent = '☀️';
            themeText.textContent = 'ДЕНЬ';
        }
        
        // ============ ФИЛЬТРАЦИЯ ============
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTheme = btn.dataset.theme;
                applyFilter();
            });
        });
        
        // ЗАПУСК
        fetchNews();
        setInterval(fetchNews, 10 * 60 * 1000);
    </script>
</body>
</html>
