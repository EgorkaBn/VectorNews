<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЕКТОР — Мировые новости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080810;
            color: #e8e8f4;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(91,91,214,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,51,102,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .logo {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5a5ff, #5b5bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .logo .badge {
            background: rgba(91,91,214,0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #a5a5ff;
            border: 1px solid rgba(91,91,214,0.3);
        }
        
        .logo p {
            width: 100%;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        /* Погода */
        .weather-widget {
            background: rgba(15,15,26,0.6);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .weather-icon {
            font-size: 28px;
        }
        
        .weather-info {
            display: flex;
            flex-direction: column;
        }
        
        .weather-temp {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        
        .weather-desc {
            font-size: 10px;
            color: #888;
        }
        
        .weather-place {
            font-size: 10px;
            color: #5b5bd6;
            margin-left: 8px;
        }
        
        /* Радио */
        .radio-widget {
            background: rgba(15,15,26,0.6);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .radio-btn {
            background: #ff3366;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .radio-btn:hover {
            background: #ff5c85;
            transform: scale(1.02);
        }
        
        .radio-btn.stop {
            background: rgba(255,51,102,0.2);
            border: 1px solid rgba(255,51,102,0.5);
            color: #ff3366;
        }
        
        .radio-status {
            font-size: 11px;
            color: #888;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,51,102,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,51,102,0.3);
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff3366;
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
        }
        
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        
        .live-text {
            font-size: 11px;
            font-weight: 600;
            color: #ff3366;
            letter-spacing: 1px;
        }
        
        .datetime {
            display: flex;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #888;
        }
        
        .date, .time {
            background: rgba(255,255,255,0.03);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        
        .google-translate {
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Виджет новостей */
        .widget-container {
            background: rgba(15,15,26,0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 24px;
        }
        
        .widget-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
        }
        
        iframe {
            width: 100%;
            height: 700px;
            border: none;
            background: transparent;
        }
        
        /* Подвал */
        .footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .footer-links {
            display: flex;
            gap: 24px;
        }
        
        .footer a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .footer a:hover {
            color: #a5a5ff;
        }
        
        .copyright {
            font-size: 11px;
        }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; }
            .header-right { justify-content: center; }
            .logo h1 { font-size: 28px; }
            .logo .badge { font-size: 10px; }
            iframe { height: 550px; }
            .footer { flex-direction: column; text-align: center; }
            .weather-widget, .radio-widget { padding: 4px 12px; }
            .weather-icon { font-size: 22px; }
            .weather-temp { font-size: 14px; }
        }
        
        @media (max-width: 480px) {
            .datetime { font-size: 11px; }
            .date, .time { padding: 4px 10px; }
            iframe { height: 500px; }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5b5bd6; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>ВЕКТОР</h1>
                <div class="badge">20 источников</div>
                <p>Мировые новости · Аналитика · 24/7</p>
            </div>
            <div class="header-right">
                <!-- Погода -->
                <div class="weather-widget" id="weatherWidget">
                    <div class="weather-icon" id="weatherIcon">☀️</div>
                    <div class="weather-info">
                        <div class="weather-temp" id="weatherTemp">--°C</div>
                        <div class="weather-desc" id="weatherDesc">Москва</div>
                    </div>
                </div>
                
                <!-- Радио -->
                <div class="radio-widget">
                    <button class="radio-btn" id="radioBtn">🎙️ Включить</button>
                    <span class="radio-status" id="radioStatus">Вести FM</span>
                </div>
                
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span class="live-text">LIVE</span>
                </div>
                <div class="datetime">
                    <div class="date" id="currentDate"></div>
                    <div class="time" id="currentTime"></div>
                </div>
                <div class="google-translate">
                    <div id="google_translate_element"></div>
                </div>
            </div>
        </div>
        
        <div class="widget-container">
            <iframe 
                src="https://www.inoreader.com/stream/user/1003523689/tag/%D0%92%D0%95%D0%9A%D0%A2%D0%9E%D0%A0/view/html?theme=dark&style=cards"
                title="Новостная лента ВЕКТОР"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        
        <div class="footer">
            <div class="copyright">
                © 2025 ВЕКТОР · Все права на новости принадлежат авторам
            </div>
            <div class="footer-links">
                <a href="https://www.inoreader.com" target="_blank">Inoreader</a>
                <a href="#" style="cursor: default;">20 источников</a>
                <a href="#" style="cursor: default;">Обновляется автоматически</a>
            </div>
        </div>
    </div>

    <script>
        // ============ ПОГОДА (OpenWeatherMap бесплатный API) ============
        async function getWeather() {
            try {
                // Бесплатный API от OpenWeatherMap (публичный, без ключа)
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.75&longitude=37.62&current_weather=true&timezone=Europe/Moscow');
                const data = await response.json();
                
                if (data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const weatherCode = data.current_weather.weathercode;
                    
                    // Коды погоды Open-Meteo
                    const weatherMap = {
                        0: ['☀️', 'Ясно'], 1: ['🌤️', 'Преимущественно ясно'], 2: ['⛅', 'Переменная облачность'],
                        3: ['☁️', 'Пасмурно'], 45: ['🌫️', 'Туман'], 51: ['🌧️', 'Морось'],
                        61: ['🌧️', 'Дождь'], 71: ['🌨️', 'Снег'], 80: ['🌦️', 'Ливень']
                    };
                    const weather = weatherMap[weatherCode] || ['🌡️', 'Облачно'];
                    
                    document.getElementById('weatherIcon').textContent = weather[0];
                    document.getElementById('weatherTemp').textContent = `${temp}°C`;
                    document.getElementById('weatherDesc').textContent = weather[1];
                }
            } catch (error) {
                console.log('Weather error:', error);
                document.getElementById('weatherTemp').textContent = '--°C';
            }
        }
        
        getWeather();
        setInterval(getWeather, 30 * 60 * 1000); // Обновляем каждые 30 минут
        
        // ============ РАДИО (Вести FM) ============
        let audio = null;
        let isPlaying = false;
        const radioBtn = document.getElementById('radioBtn');
        const radioStatus = document.getElementById('radioStatus');
        
        function initRadio() {
            if (!audio) {
                audio = new Audio();
                audio.src = 'https://icecast.vgtrk.cdnvideo.ru/vestifm_mp3_128kbps';
                audio.preload = 'none';
                audio.onerror = () => {
                    radioStatus.textContent = 'Ошибка потока';
                    radioBtn.textContent = '🎙️ Ошибка';
                };
                audio.onplaying = () => {
                    radioStatus.textContent = 'Вести FM · Играет';
                    radioBtn.textContent = '⏸️ Остановить';
                    radioBtn.classList.add('stop');
                };
                audio.onpause = () => {
                    radioStatus.textContent = 'Вести FM';
                    radioBtn.textContent = '🎙️ Включить';
                    radioBtn.classList.remove('stop');
                };
            }
        }
        
        function toggleRadio() {
            initRadio();
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                }).catch(() => {
                    radioStatus.textContent = 'Нажмите для запуска';
                    radioBtn.textContent = '🎙️ Включить';
                });
            }
        }
        
        radioBtn.onclick = toggleRadio;
        
        // Инициализация аудио при первом клике
        document.body.addEventListener('click', initRadio, { once: true });
        
        // ============ ДАТА И ВРЕМЯ ============
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU', options);
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // ============ GOOGLE TRANSLATE ============
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'auto',
                includedLanguages: 'ru,en,de,fr,es,zh,ar',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
