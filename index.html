<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UranNews — мировая новостная лента</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #e2e8f0;
            --text-meta: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
            --accent-light: #1d4ed8;
            --accent-soft: #0f172a;
            --accent-hover: #2563eb;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-card: 0 6px 24px rgba(0, 0, 0, 0.45);
            --shadow-inner: inset 0 1px 2px rgba(0, 0, 0, 0.25);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.35, 0, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.65;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 16px 40px;
        }

        header {
            margin-bottom: 32px;
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .site-title {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: #60a5fa;
        }

        .site-subtitle {
            font-size: 1rem;
            color: var(--text-meta);
            margin-top: 4px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .btn:active {
            transform: translateY(0.5px);
        }

        .sections {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }

        .section-pill {
            padding: 6px 16px;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 30px;
            background: var(--bg-secondary);
            color: var(--text-meta);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
        }

        .section-pill:hover {
            background: #334155;
            color: #93c5fd;
        }

        .section-pill.selected {
            background: #1d4ed8;
            color: #ffffff;
            border-color: #3b82f6;
        }

        .section-pill.selected:hover {
            background: #1e40af;
        }

        #controls {
            padding: 22px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 10;
            margin-bottom: 28px;
        }

        #controls label {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text-meta);
            white-space: nowrap;
        }

        #keyword-filter {
            flex: 1;
            min-width: 280px;
            padding: 10px 16px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: #0f172a;
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition);
            box-shadow: var(--shadow-inner);
        }

        #keyword-filter::placeholder {
            color: var(--text-meta);
        }

        #keyword-filter:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.35);
        }

        #feed-container {
            height: calc(100vh - 290px);
            max-height: none;
            overflow-y: auto;
            padding: 18px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .news-item {
            padding: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .news-item:hover {
            transform: translateY(-3px) scale(1.005);
            box-shadow: var(--shadow-card);
            background: var(--bg-card-hover);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .news-meta-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: var(--text-meta);
        }

        .news-meta-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-meta);
        }

        .news-title {
            margin: 0 0 10px 0;
            font-size: 1.12rem;
            font-weight: 600;
            line-height: 1.35;
            word-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-title a {
            text-decoration: none;
            color: #93c5fd;
            transition: color var(--transition);
        }

        .news-title a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .news-excerpt {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.55;
        }

        .news-meta-right {
            font-size: 0.83rem;
            color: var(--text-meta);
        }

        .source-tag {
            padding: 4px 10px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 16px;
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            color: #ffffff;
            white-space: nowrap;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        .loading,
        .error {
            text-align: center;
            padding: 40px 0;
            font-size: 0.95rem;
            color: var(--text-meta);
        }

        .error {
            color: #f87171;
        }

        footer {
            margin-top: 36px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-meta);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            flex-direction: column;
            align-items: center;
        }

        footer a {
            color: #60a5fa;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            #app {
                padding: 16px 12px;
            }

            .site-title {
                font-size: 2rem;
            }

            .site-header,
            .header-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .sections {
                flex-direction: column;
            }

            #controls {
                flex-direction: column;
                align-items: stretch;
            }

            #keyword-filter {
                width: 100%;
            }

            #feed-container {
                height: calc(100vh - 270px);
            }

            .news-item {
                padding: 16px;
            }

            .news-title {
                font-size: 1rem;
            }

            .news-excerpt {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div id="app">

    <header>
        <div class="site-header">
            <div>
                <h1 class="site-title">UranNews</h1>
                <p class="site-subtitle">Мировая новостная лента в реальном времени</p>
            </div>
            <div class="header-controls">
                <button id="refresh-btn" class="btn">🔄 Обновить</button>
                <button id="theme-toggle" class="btn">🌙 Тема</button>
            </div>
        </div>

        <div class="sections">
            <span class="section-pill selected" data-section="all">Все</span>
            <span class="section-pill" data-section="russia">Россия</span>
            <span class="section-pill" data-section="usa">США</span>
            <span class="section-pill" data-section="europe">Европа</span>
            <span class="section-pill" data-section="asia">Азия / Ближний Восток</span>
        </div>
    </header>

    <div id="controls">
        <label for="keyword-filter">Поиск по заголовкам:</label>
        <input
            type="text"
            id="keyword-filter"
            placeholder="война, экономика, выборы, технологии, климат"
        >
    </div>

    <div id="feed-container">
        <p class="loading">Загрузка новостей из сервера…</p>
    </div>

    <footer>
        <p>UranNews — агрегатор мировых новостей</p>
        <p>Заголовки и описания формируются автоматически из RSS‑каналов.</p>
    </footer>

</div>
