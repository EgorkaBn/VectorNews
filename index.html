<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЕКТОР НОВОСТИ</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        crimson: '#B91C1C',
                        navy: '#1E293B',
                        gold: '#D97706'
                    },
                    fontFamily: {
                        'display': ['Playfair Display', 'serif'],
                        'sans': ['Outfit', 'sans-serif'],
                        body: ['Outfit', 'sans-serif']
                    },
                    borderRadius: {
                        '6xl': '2.5rem'
                    }
                }
            }
        }
    </script>
    <style>
        /* НОЧЬ - тёмный градиент (как было) */
        body.dark { 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 30%, #16213e 60%, #0f3460 100%) !important;
            background-attachment: fixed !important;
        }
        body.dark::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(185,28,28,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(217,119,6,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(30,41,59,0.08) 0%, transparent 70%);
            z-index: -2; pointer-events: none;
        }

        /* ДЕНЬ - ЛЁГКИЙ градиент (не яркий) */
        body:not(.dark) { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 40%, #cbd5e1 70%, #e2e8f0 100%);
            background-attachment: fixed;
        }
        body:not(.dark)::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(185,28,28,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(217,119,6,0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(148,163,184,0.04) 0%, transparent 70%);
            z-index: -2; pointer-events: none;
        }

        /* СВЕЧЕНИЕ ЛОГО */
        .logo-glow {
            filter: drop-shadow(0 0 10px rgba(185,28,28,0.6)) drop-shadow(0 0 20px rgba(217,119,6,0.4));
            animation: logoPulse 3s ease-in-out infinite alternate;
        }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        /* Glassmorphism */
        .glass-panel { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(148,163,184,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
        body.dark .glass-panel { background: rgba(15,23,42,0.7); border-color: rgba(71,85,105,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

        /* Остальные стили как раньше */
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
        .animate-marquee { animation: marquee 30s linear infinite; }
        .radio-glow { box-shadow: 0 12px 40px rgba(185,28,28,0.5), 0 0 30px rgba(185,28,28,0.4), inset 0 2px 10px rgba(255,255,255,0.4) !important; }
        .logo-gradient { background: linear-gradient(135deg, #B91C1C 0%, #D97706 50%, #1E293B 100%); background-size: 200% 200%; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: logoShift 6s ease infinite; font-family: 'Playfair Display', serif; font-weight: 900; }
        @keyframes logoShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .topics-nav { display: flex; gap: 0.75rem; justify-content: center; padding: 1.5rem 2rem; }
        .topic-btn { padding: 0.6rem 1.5rem; border-radius: 2rem; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); border: 1px solid rgba(148,163,184,0.4); position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); color: #1e293b; }
        body.dark .topic-btn { background: rgba(51,65,85,0.8); color: rgba(255,255,255,0.95); border-color: rgba(71,85,105,0.6); }
        .topic-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: left 0.7s; }
        .topic-btn:hover::before { left: 100%; }
        .topic-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 16px 50px rgba(0,0,0,0.3); border-color: rgba(185,28,28,0.5); }
        .topic-btn.active { background: linear-gradient(135deg, rgba(185,28,28,0.95), rgba(217,119,6,0.95)); color: white !important; border-color: transparent; box-shadow: 0 16px 50px rgba(185,28,28,0.6); }

        .sport-container { position: relative; }
        .countries-list { position: absolute; right: -4rem; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 0.3rem; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); padding: 0.75rem; border-radius: 1.25rem; border: 1px solid rgba(148,163,184,0.4); opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); pointer-events: none; z-index: 20; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
        body.dark .countries-list { background: rgba(15,23,42,0.8); border-color: rgba(71,85,105,0.5); }
        .sport-container:hover .countries-list { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(-50%) translateX(10px); }
        .country-btn { width: 1.8rem; height: 1.3rem; border-radius: 0.4rem; font-size: 0.7rem; font-weight: 700; border: 1px solid rgba(148,163,184,0.5); transition: all 0.3s ease; color: #1e293b; }
        body.dark .country-btn { color: white; border-color: rgba(255,255,255,0.5); }
        .country-btn:hover { transform: scale(1.2); box-shadow: 0 6px 25px rgba(0,0,0,0.3); }
        .country-btn.active { background: rgba(255,255,255,0.9); color: #1E293B; }
    </style>
</head>
<body class="font-sans antialiased transition-all duration-700 ease-in-out">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 shadow-2xl">
        <div class="hidden md:block glass-panel text-slate-800 dark:text-slate-200 py-3 px-8 text-xs font-bold uppercase tracking-widest border-b backdrop-blur-xl">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-8 nav-info">
                    <span class="date-time" id="currentDateTime">30 марта 2026 • 20:42 MSK</span>
                    <span class="text-slate-400 dark:text-slate-500">|</span>
                    <a href="#" class="nav-link hover:text-gold transition-all duration-300 text-slate-700 dark:text-slate-300">Архив</a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="#" class="p-3 rounded-3xl glass-panel hover:bg-slate-200/50 dark:hover:bg-slate-800/50 backdrop-blur-xl transition-all duration-400 shadow-xl hover:shadow-2xl">📱</a>
                    <a href="#" class="p-3 rounded-3xl glass-panel hover:bg-slate-200/50 dark:hover:bg-slate-800/50 backdrop-blur-xl transition-all duration-400 shadow-xl hover:shadow-2xl">💬</a>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6 lg:px-8 py-8 glass-panel shadow-2xl border-b backdrop-blur-3xl">
            <div class="flex items-center justify-between">
                <button class="lg:hidden p-4 rounded-3xl glass-panel hover:bg-slate-200/50 dark:hover:bg-slate-800/40 backdrop-blur-xl transition-all duration-500 shadow-xl hover:shadow-2xl">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>

                <a href="#" class="group flex flex-col items-center gap-2 logo-glow">
                    <span class="logo-gradient text-5xl lg:text-6xl xl:text-7xl tracking-tight uppercase drop-shadow-4xl group-hover:scale-105 transition-all duration-700">ВЕКТОР</span>
                    <span class="text-xl lg:text-2xl font-sans font-bold text-slate-800 dark:text-slate-200 tracking-tight uppercase drop-shadow-2xl">новости</span>
                </a>

                <div class="flex items-center gap-4">
                    <button id="radioBtnPerfect" class="group relative w-44 h-16 lg:w-52 lg:h-20 rounded-3xl glass-panel backdrop-blur-3xl shadow-xl hover:shadow-3xl hover:scale-[1.05] transition-all duration-500 font-bold uppercase tracking-[0.2em] text-lg overflow-hidden hover:radio-glow button-text">
                        <span class="flex items-center justify-center gap-3 h-full z-10 px-4">
                            <span id="radioIconPerfect" class="text-2xl lg:text-3xl transition-all duration-400 shrink-0 text-slate-800 dark:text-slate-200">▶</span>
                            <span id="radioTextPerfect" class="font-black tracking-tight text-sm lg:text-base text-slate-800 dark:text-slate-200">ВЕСТИ FM</span>
                        </span>
                        <div class="absolute inset-0 bg-gradient-to-br from-crimson/40 via-red-500/50 to-gold/40 rounded-3xl opacity-0 group-hover:opacity-100 transition-all duration-600 blur-sm scale-[1.02]"></div>
                    </button>

                    <button id="themeBtnPerfect" class="group relative w-44 h-16 lg:w-52 lg:h-20 rounded-3xl glass-panel backdrop-blur-3xl shadow-xl hover:shadow-3xl hover:scale-[1.05] transition-all duration-500 font-bold uppercase tracking-[0.1em] text-lg overflow-hidden hover:theme-glow button-text">
                        <span class="flex flex-col items-center justify-center h-full z-10 px-4 gap-1">
                            <span id="themeIconPerfect" class="text-2xl lg:text-3xl transition-all duration-600 shrink-0 text-slate-800 dark:text-slate-200">🌙</span>
                            <span id="themeTextPerfect" class="font-black tracking-tight text-xs lg:text-sm text-slate-800 dark:text-slate-200">НОЧЬ</span>
                        </span>
                        <div class="absolute inset-0 bg-gradient-to-br from-navy/40 via-slate-700/50 to-slate-900/40 rounded-3xl opacity-0 group-hover:opacity-100 transition-all duration-600 blur-sm scale-[1.02]"></div>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- nav -->
    <nav class="glass-panel max-w-7xl mx-auto px-8 py-4 shadow-2xl border-b backdrop-blur-3xl mx-4 -mt-4 rounded-3xl">
        <div class="topics-nav flex gap-2 justify-center">
            <button class="topic-btn active" data-topic="main">🏠 Главная</button>
            <button class="topic-btn" data-topic="politics">🇷🇺 Политика</button>
            <button class="topic-btn" data-topic="war">⚔️ Конфликт</button>
            <button class="topic-btn" data-topic="cyber">🛡️ Кибер</button>
            <button class="topic-btn" data-topic="incidents">🚨 ЧП</button>
            <button class="topic-btn" data-topic="economy">💰 Экономика</button>
            <button class="topic-btn sport-container" data-topic="sport">⚽ Спорт
                <div class="countries-list">
                    <button class="country-btn active" data-country="usa" title="🇺🇸 США">🇺🇸</button>
                    <button class="country-btn" data-country="japan" title="🇯🇵 Япония">🇯🇵</button>
                    <button class="country-btn" data-country="tajikistan" title="🇹🇯 Таджикистан">🇹🇯</button>
                    <button class="country-btn" data-country="turkmenistan" title="🇹🇲 Туркменистан">🇹🇲</button>
                </div>
            </button>
        </div>
    </nav>

    <!-- Ticker -->
    <div class="glass-panel backdrop-blur-xl shadow-2xl border-b-2 overflow-hidden mx-8 -mt-8 rounded-3xl">
        <div class="max-w-7xl mx-auto px-8 py-6">
            <div class="flex items-center h-20">
                <div class="flex-shrink-0 px-10 py-6 bg-gradient-to-r from-crimson to-gold rounded-3xl font-bold uppercase tracking-[0.4em] text-xl shadow-2xl mr-16 ticker-badge backdrop-blur-xl border text-white">🔥 ГЛАВНЫЕ НОВОСТИ</div>
                <div class="flex-1 overflow-hidden">
                    <div class="flex animate-marquee w-[200%] items-center">
                        <span class="px-20 py-6 text-2xl font-semibold text-slate-800 dark:text-slate-200 hover:text-gold cursor-pointer transition-all duration-300 whitespace-nowrap ticker-text font-sans">ТАСС: Трамп анонсировал новые санкции против России</span>
                        <span class="px-20 py-6 text-2xl font-semibold text-slate-800 dark:text-slate-200 hover:text-gold cursor-pointer transition-all duration-300 whitespace-nowrap ticker-text font-sans">РИА: Москва готовит ответ НАТО</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hero -->
    <section class="max-w-7xl mx-auto px-8 mb-32 mt-16">
        <div class="relative h-[80vh] rounded-6xl overflow-hidden shadow-4xl glass-panel backdrop-blur-3xl border-4 border-slate-200/50 dark:border-white/30">
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4')] bg-cover bg-center opacity-40"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-slate-800/40 to-transparent"></div>
            <div class="relative z-10 flex flex-col justify-end h-full p-20">
                <div class="space-y-6">
                    <span class="inline-block bg-gradient-to-r from-crimson to-gold text-slate-900 dark:text-white px-10 py-4 text-lg font-bold tracking-[0.5em] uppercase rounded-3xl backdrop-blur-xl shadow-2xl border border-slate-200/50 dark:border-white/50 meta-info">ТАСС • Главная</span>
                    <h1 class="hero-title text-8xl lg:text-[10rem] font-display font-black leading-none drop-shadow-4xl text-white">ТРАМП<br>САНКЦИИ</h1>
                    <p class="text-4xl font-display italic drop-shadow-2xl font-bold tracking-wide meta-info text-slate-200">30 марта 2026</p>
                </div>
            </div>
        </div>
    </section>

    <audio id="radioPerfect" preload="metadata" crossorigin="anonymous">
        <source src="https://icecast-vgtrk.cdnvideo.ru/vestifm_mp3_128kbps" type="audio/mpeg">
    </audio>

    <script>
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleDateString('ru-RU', {day: 'numeric', month: 'long', year: 'numeric'}) + ` • ${now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'})} MSK`;
        }
        updateDateTime(); setInterval(updateDateTime, 60000);

        document.getElementById('themeBtnPerfect').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        };
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');

        const radio = document.getElementById('radioPerfect');
        document.getElementById('radioBtnPerfect').onclick = async () => {
            try { if (radio.paused) { radio.volume = 0.8; await radio.play(); } else radio.pause(); } catch(e) { alert('🔊 Разрешите звук'); }
        };

        document.querySelectorAll('.topic-btn:not(.sport-container), .country-btn').forEach(btn => {
            btn.onclick = e => {
                e.stopPropagation();
                btn.parentElement.querySelectorAll('.topic-btn, .country-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        const sportContainer = document.querySelector('.sport-container');
        const countriesList = document.querySelector('.countries-list');
        sportContainer.addEventListener('mouseenter', () => { countriesList.style.opacity = '1'; countriesList.style.visibility = 'visible'; });
        sportContainer.addEventListener('mouseleave', () => { countriesList.style.opacity = '0'; countriesList.style.visibility = 'hidden'; });
    </script>
</body>
</html>
