<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ВЕКТОР — Мировые новости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #080810;
            color: #e8e8f4;
            padding: 16px;
        }
        .header {
            margin-bottom: 24px;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #fff, #5b5bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .sub {
            color: #666;
            font-size: 13px;
        }
        .stats {
            font-size: 12px;
            color: #5b5bd6;
            margin-top: 8px;
        }
        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 640px) {
            .news-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .news-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .card {
            background: #0f0f1a;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .card:hover {
            border-color: #5b5bd6;
            transform: translateY(-2px);
        }
        .source {
            font-size: 11px;
            color: #5b5bd6;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .time {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8,8,16,0.98);
            z-index: 10000;
            overflow-y: auto;
        }
        .modal.active {
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            position: sticky;
            top: 0;
            background: #080810;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a3a;
        }
        .modal-header h3 {
            font-size: 14px;
            color: #5b5bd6;
        }
        .close-modal {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            padding: 20px 16px 40px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        .modal-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .modal-text {
            font-size: 16px;
            line-height: 1.6;
            color: #c0c0e0;
            margin-bottom: 32px;
            white-space: pre-wrap;
        }
        .modal-source {
            padding-top: 24px;
            border-top: 1px solid #2a2a3a;
            font-size: 12px;
            color: #666;
        }
        .modal-source a {
            color: #5b5bd6;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a3a;
            border-top-color: #5b5bd6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            color: #ff8099;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ВЕКТОР</h1>
        <div class="sub">Мировые новости · 16 источников</div>
        <div class="stats" id="stats">Загрузка новостей...</div>
    </div>
    <div id="newsContainer" class="news-grid">
        <div class="loading">
            <div class="spinner"></div>
            Загрузка новостей...
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="newsModal" class="modal">
        <div class="modal-header">
            <h3>📰 ВЕКТОР · Полная новость</h3>
            <button class="close-modal" id="closeModalBtn">✕</button>
        </div>
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-meta">
                <span id="modalSource"></span>
                <span id="modalDate"></span>
            </div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-source" id="modalOriginalLink"></div>
        </div>
    </div>

    <script>
        const SOURCES = [
            { name: 'РИА Новости', url: 'https://ria.ru/export/rss2/index.xml' },
            { name: 'Meduza', url: 'https://meduza.io/rss/all' },
            { name: 'Хроники Туркменистана', url: 'https://www.hronikatm.com/feed/' },
            { name: 'BBC News', url: 'http://feeds.bbci.co.uk/news/rss.xml' },
            { name: 'The Guardian', url: 'https://www.theguardian.com/world/rss' },
            { name: 'РБК', url: 'https://www.rbc.ru/rss/' },
            { name: 'Tengrinews', url: 'https://tengrinews.kz/rss/all.xml' },
            { name: 'Asia-Plus', url: 'https://asiaplustj.info/ru/rss.xml' },
            { name: 'Turkmenportal', url: 'https://turkmenportal.com/rss/ru' },
            { name: 'Gazeta.uz', url: 'https://www.gazeta.uz/rss/ru' },
            { name: 'Kaktus.media', url: 'https://kaktus.media/rss' },
            { name: 'Sputnik Таджикистан', url: 'https://sputnik-tj.com/rss' },
            { name: 'CNN', url: 'http://rss.cnn.com/rss/edition.rss' },
            { name: 'Reuters', url: 'https://www.reuters.com/rss/topNews' },
            { name: 'Bloomberg', url: 'https://www.bloomberg.com/feed' },
            { name: 'TechCrunch', url: 'https://techcrunch.com/feed' }
        ];

        let allNews = [];
        const STORAGE_KEY = 'vector_news_cache';
        const WORKER_URL = 'https://news-proxy.galaxyenglishia.workers.dev';

        function formatDate(dateStr) {
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return 'недавно';
                const now = new Date();
                const diff = Math.floor((now - d) / 60000);
                if (diff < 1) return 'только что';
                if (diff < 60) return `${diff} мин назад`;
                if (diff < 1440) return `${Math.floor(diff/60)} ч назад`;
                return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
            } catch { return 'недавно'; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function fetchSource(source) {
            const url = `${WORKER_URL}?url=${encodeURIComponent(source.url)}`;
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15000);
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                if (!response.ok) return [];
                const data = await response.json();
                if (data.status !== 'ok' || !data.items) return [];

                const items = [];
                for (let i = 0; i < Math.min(data.items.length, 8); i++) {
                    const item = data.items[i];
                    let title = item.title || '';
                    let desc = (item.description || '').replace(/<[^>]*>/g, '').substring(0, 800);
                    
                    // Если заголовок пустой, берём из описания
                    if (!title && desc) {
                        title = desc.substring(0, 100);
                    }
                    if (!title) {
                        const urlParts = item.link.split('/');
                        title = (urlParts[urlParts.length - 1] || 'Новость').replace(/-/g, ' ');
                    }
                    
                    items.push({
                        id: `${source.name}-${i}-${Date.now()}`,
                        title: title.substring(0, 200),
                        description: desc || 'Нет описания',
                        fullText: desc || 'Нет описания',
                        url: item.link,
                        source: source.name,
                        publishedAt: item.pubDate,
                        topic: 'news'
                    });
                }
                console.log(`✅ ${source.name}: ${items.length} новостей`);
                return items;
            } catch (e) {
                console.warn(`❌ ${source.name}:`, e.message);
                return [];
            }
        }

        async function loadAllNews() {
            const container = document.getElementById('newsContainer');
            const statsEl = document.getElementById('stats');
            container.innerHTML = `<div class="loading"><div class="spinner"></div>Загрузка новостей...</div>`;
            
            let allFresh = [];
            for (let i = 0; i < SOURCES.length; i++) {
                const items = await fetchSource(SOURCES[i]);
                allFresh.push(...items);
                statsEl.innerHTML = `Загружено: ${i+1}/${SOURCES.length} источников · Найдено новостей: ${allFresh.length}`;
            }
            
            // Сохраняем в кэш
            const cached = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const seen = new Set(cached.map(n => n.url));
            allNews = [...allFresh.filter(n => !seen.has(n.url)), ...cached];
            
            // Сортируем по дате
            allNews.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
            
            // Ограничиваем 100 последними новостями
            if (allNews.length > 100) allNews = allNews.slice(0, 100);
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allNews));
            
            renderNews();
            statsEl.innerHTML = `📰 Всего новостей: ${allNews.length} · Обновлено: ${new Date().toLocaleTimeString()}`;
        }

        function openNewsModal(news) {
            document.getElementById('modalTitle').innerHTML = escapeHtml(news.title);
            document.getElementById('modalSource').innerHTML = `📰 ${escapeHtml(news.source)}`;
            document.getElementById('modalDate').innerHTML = `🕒 ${formatDate(news.publishedAt)}`;
            document.getElementById('modalText').innerHTML = escapeHtml(news.fullText || news.description || 'Полный текст новости доступен по ссылке на источник.');
            document.getElementById('modalOriginalLink').innerHTML = `📌 Источник: <a href="${news.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(news.source)} (оригинал)</a> — Все права принадлежат автору.`;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderNews() {
            const container = document.getElementById('newsContainer');
            if (!allNews.length) {
                container.innerHTML = `<div class="loading">😕 Новостей пока нет. Попробуйте обновить страницу.</div>`;
                return;
            }
            
            container.innerHTML = allNews.map(news => `
                <div class="card" data-news-id="${news.id}">
                    <div class="source">📰 ${escapeHtml(news.source)}</div>
                    <div class="title">${escapeHtml(news.title)}</div>
                    <div class="desc">${escapeHtml(news.description.substring(0, 200))}${news.description.length > 200 ? '...' : ''}</div>
                    <div class="time">🕒 ${formatDate(news.publishedAt)}</div>
                </div>
            `).join('');
            
            // Добавляем обработчики кликов
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const newsId = card.dataset.newsId;
                    const news = allNews.find(n => n.id === newsId);
                    if (news) openNewsModal(news);
                });
            });
        }

        // Инициализация
        async function init() {
            // Восстанавливаем из кэша
            try {
                const cached = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                if (cached.length) {
                    allNews = cached;
                    renderNews();
                    document.getElementById('stats').innerHTML = `📰 Всего новостей: ${allNews.length} (из кэша) · Обновление...`;
                }
            } catch(e) {}
            
            // Загружаем свежие новости
            await loadAllNews();
            
            // Обновляем каждые 30 минут
            setInterval(loadAllNews, 30 * 60 * 1000);
        }
        
        // Закрытие модального окна
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('newsModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('newsModal')) closeModal();
        });
        
        init();
    </script>
</body>
</html>
