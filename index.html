<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ВЕКТОР — Мировые новости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080810;
            color: #e8e8f4;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(91,91,214,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,51,102,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .logo {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5a5ff, #5b5bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .logo .badge {
            background: rgba(91,91,214,0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #a5a5ff;
            border: 1px solid rgba(91,91,214,0.3);
        }
        
        .logo p {
            width: 100%;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        /* Погода */
        .weather-widget {
            background: rgba(15,15,26,0.6);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .weather-icon { font-size: 28px; }
        .weather-info { display: flex; flex-direction: column; }
        .weather-temp { font-size: 18px; font-weight: 700; color: #fff; }
        .weather-desc { font-size: 10px; color: #888; }
        
        /* Радио */
        .radio-widget {
            background: rgba(15,15,26,0.6);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .radio-btn {
            background: #ff3366;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .radio-btn:hover { background: #ff5c85; transform: scale(1.02); }
        .radio-btn.stop { background: rgba(255,51,102,0.2); border: 1px solid rgba(255,51,102,0.5); color: #ff3366; }
        .radio-status { font-size: 11px; color: #888; }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,51,102,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,51,102,0.3);
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff3366;
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
        }
        
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .live-text { font-size: 11px; font-weight: 600; color: #ff3366; letter-spacing: 1px; }
        
        .datetime {
            display: flex;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #888;
        }
        
        .date, .time {
            background: rgba(255,255,255,0.03);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        
        .google-translate {
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Сетка новостей */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        
        .news-card {
            background: #0f0f1a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #5b5bd6, #a5a5ff);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .news-card:hover {
            transform: translateY(-4px);
            border-color: rgba(91,91,214,0.4);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }
        
        .news-card:hover::before { opacity: 1; }
        
        .news-source {
            font-size: 11px;
            color: #5b5bd6;
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .news-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .news-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #666;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Загрузчик */
        .loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #5b5bd6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8,8,16,0.98);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .modal.active { display: flex; align-items: center; justify-content: center; }
        
        .modal-content {
            background: #0f0f1a;
            max-width: 700px;
            width: 90%;
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
        
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 16px; padding-right: 30px; }
        .modal-meta { font-size: 12px; color: #666; margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; }
        .modal-text { font-size: 15px; line-height: 1.6; margin-bottom: 24px; max-height: 400px; overflow-y: auto; }
        .modal-source { padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .modal-source a { color: #5b5bd6; text-decoration: none; }
        
        .footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .footer-links { display: flex; gap: 24px; }
        .footer a { color: #888; text-decoration: none; transition: color 0.2s; }
        .footer a:hover { color: #a5a5ff; }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; }
            .header-right { justify-content: center; }
            .logo h1 { font-size: 28px; }
            .news-grid { grid-template-columns: 1fr; }
            iframe { height: 550px; }
            .footer { flex-direction: column; text-align: center; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5b5bd6; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>ВЕКТОР</h1>
                <div class="badge">20 источников</div>
                <p>Мировые новости · Аналитика · 24/7</p>
            </div>
            <div class="header-right">
                <div class="weather-widget" id="weatherWidget">
                    <div class="weather-icon" id="weatherIcon">☀️</div>
                    <div class="weather-info">
                        <div class="weather-temp" id="weatherTemp">--°C</div>
                        <div class="weather-desc" id="weatherDesc">Москва</div>
                    </div>
                </div>
                <div class="radio-widget">
                    <button class="radio-btn" id="radioBtn">🎙️ Включить</button>
                    <span class="radio-status" id="radioStatus">Вести FM</span>
                </div>
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span class="live-text">LIVE</span>
                </div>
                <div class="datetime">
                    <div class="date" id="currentDate"></div>
                    <div class="time" id="currentTime"></div>
                </div>
                <div class="google-translate">
                    <div id="google_translate_element"></div>
                </div>
            </div>
        </div>
        
        <div id="newsGrid" class="news-grid">
            <div class="loader"><div class="spinner"></div><p>Загрузка новостей...</p></div>
        </div>
        
        <div class="footer">
            <div class="copyright">© 2025 ВЕКТОР · Все права на новости принадлежат авторам</div>
            <div class="footer-links">
                <a href="#" style="cursor: default;">20 источников</a>
                <a href="#" style="cursor: default;">Обновляется автоматически</a>
            </div>
        </div>
    </div>

    <div id="newsModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">✕</button>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-meta"><span id="modalSource"></span> · <span id="modalDate"></span></div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-source" id="modalLink"></div>
        </div>
    </div>

    <script>
        // RSS-ссылки ваших источников (20 штук)
        const RSS_FEEDS = [
            'https://tass.ru/rss/v2.xml',
            'https://ria.ru/export/rss2/index.xml',
            'https://meduza.io/rss/all',
            'https://lenta.ru/rss',
            'https://www.vedomosti.ru/rss/news',
            'https://www.kommersant.ru/RSS/news.xml',
            'https://feeds.npr.org/1001/rss.xml',
            'https://abcnews.go.com/abcnews/topstories',
            'https://feeds.ap.org/rss/content/News',
            'http://feeds.bbci.co.uk/news/rss.xml',
            'https://www.theguardian.com/world/rss',
            'https://feeds.skynews.com/feeds/rss/uk.xml',
            'https://www.hronikatm.com/feed/',
            'https://turkmenportal.com/rss/ru',
            'https://asiaplustj.info/ru/rss.xml',
            'https://sputnik-tj.com/rss',
            'https://tengrinews.kz/rss/all.xml',
            'https://www3.nhk.or.jp/rss/news/cat0.xml',
            'https://www.aljazeera.com/xml/rss/all.xml',
            'https://www.gazeta.uz/rss/ru'
        ];
        
        const PROXIES = [
            async (url) => { const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`); const data = await res.json(); return data.contents; },
            async (url) => { const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`); const data = await res.json(); return data.data || (typeof data === 'string' ? data : null); }
        ];
        
        let allNews = [];
        
        async function fetchWithProxy(url) {
            for (const proxy of PROXIES) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 10000);
                    const result = await proxy(url);
                    clearTimeout(timeout);
                    if (result && result.length > 100) return result;
                } catch(e) {}
            }
            throw new Error('All proxies failed');
        }
        
        function getSourceName(url) {
            if (url.includes('tass.ru')) return 'ТАСС';
            if (url.includes('ria.ru')) return 'РИА Новости';
            if (url.includes('meduza')) return 'Meduza';
            if (url.includes('lenta.ru')) return 'Lenta.ru';
            if (url.includes('vedomosti')) return 'Ведомости';
            if (url.includes('kommersant')) return 'Коммерсантъ';
            if (url.includes('npr.org')) return 'NPR';
            if (url.includes('abcnews')) return 'ABC News';
            if (url.includes('ap.org')) return 'Associated Press';
            if (url.includes('bbc')) return 'BBC News';
            if (url.includes('guardian')) return 'The Guardian';
            if (url.includes('skynews')) return 'Sky News';
            if (url.includes('hronikatm')) return 'Хроники Туркменистана';
            if (url.includes('turkmenportal')) return 'Turkmenportal';
            if (url.includes('asiaplustj')) return 'Asia-Plus';
            if (url.includes('sputnik-tj')) return 'Sputnik Таджикистан';
            if (url.includes('tengrinews')) return 'Tengrinews';
            if (url.includes('nhk')) return 'NHK World';
            if (url.includes('aljazeera')) return 'Al Jazeera';
            if (url.includes('gazeta.uz')) return 'Gazeta.uz';
            return 'Новости';
        }
        
        async function fetchFeed(url) {
            try {
                const xmlText = await fetchWithProxy(url);
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, 'text/xml');
                const items = [...xml.querySelectorAll('item')];
                const sourceName = getSourceName(url);
                
                return items.slice(0, 5).map(item => ({
                    title: item.querySelector('title')?.textContent?.replace(/<[^>]*>/g, '') || 'Новость',
                    description: item.querySelector('description')?.textContent?.replace(/<[^>]*>/g, '').substring(0, 250) || '',
                    url: item.querySelector('link')?.textContent?.replace(/<!\[CDATA\[|\]\]>/g, '') || '#',
                    source: sourceName,
                    publishedAt: item.querySelector('pubDate')?.textContent || new Date().toISOString()
                }));
            } catch(e) {
                return [];
            }
        }
        
        async function loadAllNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loader"><div class="spinner"></div><p>Загрузка новостей из 20 источников...</p></div>';
            
            const allPromises = RSS_FEEDS.map(url => fetchFeed(url));
            const results = await Promise.all(allPromises);
            allNews = results.flat();
            allNews.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
            
            renderNews();
        }
        
        function ago(dateStr) {
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return 'недавно';
                const m = Math.floor((new Date() - d) / 60000);
                if (m < 1) return 'только что';
                if (m < 60) return `${m} мин назад`;
                if (m < 1440) return `${Math.floor(m/60)} ч назад`;
                return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
            } catch { return 'недавно'; }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function renderNews() {
            const grid = document.getElementById('newsGrid');
            if (!allNews.length) {
                grid.innerHTML = '<div class="loader"><p>😕 Новостей пока нет. Попробуйте обновить страницу.</p></div>';
                return;
            }
            
            grid.innerHTML = allNews.map(news => `
                <div class="news-card" onclick="openModal('${escapeHtml(news.title)}', '${escapeHtml(news.source)}', '${escapeHtml(news.description)}', '${escapeHtml(news.url)}', '${news.publishedAt}')">
                    <div class="news-source">📰 ${escapeHtml(news.source)}</div>
                    <div class="news-title">${escapeHtml(news.title)}</div>
                    <div class="news-desc">${escapeHtml(news.description.substring(0, 150))}${news.description.length > 150 ? '...' : ''}</div>
                    <div class="news-footer">
                        <span>🕒 ${ago(news.publishedAt)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        window.openModal = function(title, source, text, url, date) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalSource').innerHTML = source;
            document.getElementById('modalDate').innerHTML = ago(date) + ' · ' + new Date(date).toLocaleString('ru-RU');
            document.getElementById('modalText').innerHTML = text || 'Описание отсутствует.';
            document.getElementById('modalLink').innerHTML = `📌 Источник: <a href="${url}" target="_blank">${source}</a> — Все права принадлежат автору.`;
            document.getElementById('newsModal').classList.add('active');
        };
        
        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
        }
        
        // Погода
        async function getWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.75&longitude=37.62&current_weather=true&timezone=Europe/Moscow');
                const data = await response.json();
                if (data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const weatherCode = data.current_weather.weathercode;
                    const weatherMap = { 0:['☀️','Ясно'], 1:['🌤️','Облачно'], 2:['⛅','Переменная'], 3:['☁️','Пасмурно'], 61:['🌧️','Дождь'], 71:['🌨️','Снег'] };
                    const weather = weatherMap[weatherCode] || ['🌡️', 'Облачно'];
                    document.getElementById('weatherIcon').textContent = weather[0];
                    document.getElementById('weatherTemp').textContent = `${temp}°C`;
                    document.getElementById('weatherDesc').textContent = weather[1];
                }
            } catch(e) {}
        }
        
        // Радио
        let audio = null;
        let isPlaying = false;
        const radioBtn = document.getElementById('radioBtn');
        const radioStatus = document.getElementById('radioStatus');
        
        function initRadio() {
            if (!audio) {
                audio = new Audio();
                audio.src = 'https://icecast.vgtrk.cdnvideo.ru/vestifm_mp3_128kbps';
                audio.preload = 'none';
                audio.onplaying = () => { radioStatus.textContent = 'Вести FM · Играет'; radioBtn.textContent = '⏸️ Остановить'; radioBtn.classList.add('stop'); };
                audio.onpause = () => { radioStatus.textContent = 'Вести FM'; radioBtn.textContent = '🎙️ Включить'; radioBtn.classList.remove('stop'); };
            }
        }
        
        function toggleRadio() {
            initRadio();
            if (isPlaying) { audio.pause(); isPlaying = false; }
            else { audio.play().then(() => { isPlaying = true; }).catch(() => {}); }
        }
        radioBtn.onclick = toggleRadio;
        document.body.addEventListener('click', initRadio, { once: true });
        
        // Дата и время
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        
        // Google Translate
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'auto', includedLanguages: 'ru,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
        }
        
        // Инициализация
        updateDateTime();
        setInterval(updateDateTime, 1000);
        getWeather();
        setInterval(getWeather, 30 * 60 * 1000);
        loadAllNews();
        setInterval(loadAllNews, 30 * 60 * 1000);
        document.getElementById('closeModalBtn').onclick = closeModal;
        document.getElementById('newsModal').onclick = (e) => { if (e.target === document.getElementById('newsModal')) closeModal(); };
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
