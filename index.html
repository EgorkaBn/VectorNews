<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЕКТОР — Мировые новости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080810;
            color: #e8e8f4;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #fff, #5b5bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .logo p {
            color: #888;
            font-size: 12px;
        }
        .google-translate {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .inoreader-widget {
            border-radius: 20px;
            overflow: hidden;
            background: #0f0f1a;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 24px;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: #0f0f1a;
        }
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        .footer a {
            color: #5b5bd6;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; }
            .logo h1 { font-size: 24px; }
            iframe { height: 600px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>ВЕКТОР</h1>
                <p>Мировые новости · 20 источников</p>
            </div>
            <div class="google-translate">
                <div id="google_translate_element"></div>
            </div>
        </div>
        
        <div class="inoreader-widget">
            <iframe 
                src="https://www.inoreader.com/stream/user/1003523689/tag/%D0%92%D0%95%D0%9A%D0%A2%D0%9E%D0%A0/view/html"
                title="Новостная лента ВЕКТОР"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        
        <div class="footer">
            © 2025 ВЕКТОР · Новости из открытых источников · 
            <a href="https://www.inoreader.com" target="_blank">Inoreader</a>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'auto',
                includedLanguages: 'ru,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
